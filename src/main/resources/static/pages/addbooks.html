<!DOCTYPE html>
<html>
	<head>
		<title>Add Books</title>
		<link rel="stylesheet" href="../css/style.css">
	</head>

	<body>

		<h1>Add Books</h1>
		<a href="index.html"> Go Back to Home</a>

		<br><br>

		<div class="card" style="width: 400px;">

			<label>Name: </label>
			<input type="text" id="name" placeholder="Enter book name">

			<br><br>

			<label>Author: </label>
			<input type="text" id="author" placeholder="Enter author name">

			<br><br>

			<label>Price: </label>
			<input type="number" id="price" placeholder="Enter price">

			<br><br>

			<label>Quantity: </label>
			<input type="number" id="quantity" placeholder="Enter quantity">

			<br><br>

			<input type="button" id="add" value="Add Book">
			<input type="button" id="cancel" value="Cancel">

		</div>

		<div id="message" style="margin-top: 16px; font-weight: bold;"></div>

	</body>

	<script>
		const base_url = "http://localhost:8081/api/books";

		document.getElementById("add").addEventListener("click", function() {

			const name = document.getElementById("name").value;
			const author = document.getElementById("author").value;
			const price = document.getElementById("price").value;
			const quantity = document.getElementById("quantity").value;

			if (!name || !author || !price || !quantity) {
				alert("Please fill all the fields");
				return;
			}

			const bookdata = {
				name: name,
				author: author,
				price: parseFloat(price),
				quantity: parseInt(quantity)
			};

			fetch(base_url + "/addbooks", {
				method: "POST",
				headers: {
					"Content-Type": "application/json"
				},
				body: JSON.stringify(bookdata)
			})
			.then(res => {
				if (!res.ok) {
					throw new Error("Failed to add book");
				}
				return res.json();
			})
			.then(data => {
				document.getElementById("message").style.color = "green";
				document.getElementById("message").innerText = ` "${data.name}" added successfully!`;

				document.getElementById("name").value = "";
				document.getElementById("author").value = "";
				document.getElementById("price").value = "";
				document.getElementById("quantity").value = "";
			})
			.catch(err => {
				document.getElementById("message").style.color = "red";
				document.getElementById("message").innerText = "❌ " + err.message;
			});
		});

		document.getElementById("cancel").addEventListener("click", function() {
			document.getElementById("name").value = "";
			document.getElementById("author").value = "";
			document.getElementById("price").value = "";
			document.getElementById("quantity").value = "";
			document.getElementById("message").innerText = "";
		});
	</script>
</html>
