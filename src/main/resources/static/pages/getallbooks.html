<!DOCTYPE html>

<html>
	
<title>Manage Books</title>
<link rel="stylesheet" href="../css/managebooks.css">

</html>

<head>
	
	<body>
		
		<h2> Manage Books</h2>
		
		<button onclick="showAddForm()">Add Books</button>
		
		<div id="addForm" style="display: none; margi-top: 10px">
		
			<input type="text" id="author" placeholder="Author Name">
			<input type="text" id="name" placeholder="Book Name">
			<input type="number" id="price" placeholder="Price">
			<input type="number" id="quantity" placeholder="Quantity">
			
			<button onclick="addBook()">Save</button>
			<button onclick="hideAddForm">Cancel</button>
			
		</div>
		
		<br><br>
		
		<table border="1" cellpadding = "8">
			
			<thead>
				
				<tr>
					
					<th>ID</th>
					<th>Author</th>
					<th>Name</th>
					<th>Price</th>
					<th>Quantity</th>
				</tr>
			</thead>
			
			<tbody id="bookTable"></tbody>
			
		</table>
	</body>
</head>
