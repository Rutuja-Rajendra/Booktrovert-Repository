<!DOCTYPE html>

<html>
	
<head>
<title>Get All Books</title>
<link rel="stylesheet" href="../css/style.css">
</head>
	
	<body>
		
		<h2> Get All Books</h2>
		<a href="index.html">Go to Home</a>
		
		<br> <br>
		
		
		<table border="1" cellpadding = "8" id="bookstable">
			
			<thead>
				
				<tr>
					
					<th>ID</th>
					<th>Author</th>
					<th>Name</th>
					<th>Price</th>
					<th>Quantity</th>
				</tr>
			</thead>
			
			<tbody id="booktableBody"></tbody>
			
		</table>
		
	</body>
	
	<script>
		
		const base_url = "http://localhost:8081/api/books";
		
		fetch(base_url)
		.then(res => res.json())
		.then(data => 
		{
			const tableBody = document.getElementById("booktableBody");
			
			if(data.length === 0)
			{
				tableBody.innerHTML = `<tr><td colspan="5">No Books Found</td></tr>`;
				return;
			}
			
			data.forEach(book => 
			{
				let row = `
				<tr>
					<td>${book.id}</td>
					<td>${book.name}</td>
					<td>${book.author}</td>
					<td>${book.price}</td>
					<td>${book.quantity}</td>
				</tr>
				`;
				
				tableBody.innerHTML +=row;
			});
			
		})
		
		.catch(error => console.error("Error loading books:",error));
	</script>
</html>
